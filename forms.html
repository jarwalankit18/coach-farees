<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Coach Farees</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo" aria-label="Coach Farees Home">
        <img src="assets/logof.jpg" alt="Coach Farees logo">
    </a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="courses.html">Upcoming Courses</a>
        <a href="form.html">Contact</a>
        <a href="https://t.me/coachfarees" target="_blank">Telegram</a>
    </div>
</nav>

<section class="section" style="margin-top:120px;">
    <h2>Enquiry Form</h2>

    <form action="https://formsubmit.co/YOUR-EMAIL-HERE" method="POST" class="application-form">

        <!-- Disable captcha -->
        <input type="hidden" name="_captcha" value="false">

        <!-- Subject line in email -->
        <input type="hidden" name="_subject" value="New Enquiry from Coach Farees Website">

        <input type="text" name="name" placeholder="Full Name" required>

        <input type="tel" 
               name="mobile" 
               placeholder="10 Digit Mobile Number" 
               pattern="[0-9]{10}" 
               required>

        <input type="email" name="email" placeholder="Email (Optional)">

        <textarea name="message" 
                  placeholder="Your Query" 
                  rows="4"></textarea>

        <button type="submit">Submit Enquiry</button>
    </form>

    <br><br>

    <div class="contact us on phone">
        <h3>Or Contact Directly</h3>
        <a href="https://t.me/coachfarees" class="btn" target="_blank">
            Message on Telegram
        </a>
        <br><br>
        <a href="tel:YOURNUMBERHERE" class="btn">
            Call Directly
        </a>
        <br><br>
        <a href="tel:YOURNUMBERHERE" class="btn">
            For Sirius Lounge
        </a>
    </div>

</section>


<footer>
    <p>© 2026 Coach Farees | UPSC Mentorship Platform</p>
</footer>

</body>
</html>
